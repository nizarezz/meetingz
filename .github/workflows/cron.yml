name: Process Job Queue

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  process-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Call jobs edge function
        run: |
          curl -s -X POST "${{ secrets.SUPABASE_FUNCTIONS_URL }}/jobs" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
